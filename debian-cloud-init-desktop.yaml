#cloud-config v2

# 1) Update and upgrade the system
package_update: true
package_upgrade: true

# 2) Install base packages
packages:
  # Desktop & Base
  - kde-plasma-desktop
  - xrdp
  - firefox-esr
  - wget
  - curl
  - gpg
  - apt-transport-https
  # Build Tools & Languages
  - build-essential
  - python3
  - python3-pip
  - python3-venv
  - git
  # Agent Utilities
  - tmux
  - jq
  - unzip

runcmd:
  # Update apt cache for dependencies before manual installs
  - apt-get update -y

  # 3) Install Docker (Crucial for AI Agent sandboxing)
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sh get-docker.sh
  - systemctl enable docker
  - systemctl start docker

  # 4) Install Node.js (Current LTS via NodeSource)
  - curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  - apt-get install -y nodejs

  # 5) Install VS Code via direct .deb download
  - curl -L -o /tmp/vscode.deb "https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64"
  - DEBIAN_FRONTEND=noninteractive apt-get install -y /tmp/vscode.deb

  # 6) Install GitHub Desktop via direct .deb download
  - curl -L -o /tmp/githubdesktop.deb "https://github.com/shiftkey/desktop/releases/download/release-3.4.13-linux1/GitHubDesktop-linux-amd64-3.4.13-linux1.deb"
  - DEBIAN_FRONTEND=noninteractive apt-get install -y /tmp/githubdesktop.deb

  # 7) Configure VS Code / Github Desktop Shortcuts via Special Script
  - sh -c 'curl -fsSL https://raw.githubusercontent.com/svk27/Project-Mango/refs/heads/main/debian-cloud-init-desktop-shortcuts.sh | bash'

  # 8) Install Codex CLI using Special Script
  - sh -c 'curl -fsSL https://raw.githubusercontent.com/svk27/Project-Mango/refs/heads/main/Layer2Setup/codex_setup.sh | bash'
